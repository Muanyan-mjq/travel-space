<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频 · 南昌</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Noto Sans SC',-apple-system,sans-serif;background:linear-gradient(180deg,#dce4ff 0%,#f3f6ff 30%,#fafaf9 60%,#e8eeff 100%) fixed;color:#1a1a1a;min-height:100vh;padding:40px}
        h1{text-align:center;font-size:28px;margin-bottom:30px}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:1200px;margin:0 auto}
        .vid{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #e5e5ea}
        video{width:100%;display:block}
        .vid .name{padding:10px 14px;font-size:12px;color:#5c5c5e}
        .back{display:inline-block;color:#2563eb;text-decoration:none;margin-bottom:20px}
    </style>
</head>
<body>
    <a class="back" href="nanchang.html">← 返回</a>
    <h1>南昌之行 · 视频</h1>
    <div class="grid" id="grid"></div>
    <script>
        fetch('videos/').then(r=>r.text()).then(html=>{
            var re=/href="([^"]+_cp\.mp4)"/gi,m,names=[];
            while((m=re.exec(html))!==null)names.push(m[1]);
            names.sort();
            var g=document.getElementById('grid');
            names.forEach(function(n){
                g.innerHTML+='<div class="vid"><video src="videos/'+n+'" controls preload="metadata"></video><div class="name">'+n.replace('_cp.mp4','').replace('VID','')+'</div></div>';
            });
        });
    </script>
</body>
</html>
